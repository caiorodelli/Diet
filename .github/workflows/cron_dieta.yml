name: Envio Diário da Dieta

on:
  schedule:
    # 08:00 BRT = 11:00 UTC
    # 12:00 BRT = 15:00 UTC
    # 14:32 BRT = 17:32 UTC
    # 20:00 BRT = 23:00 UTC
    - cron: '0 11,15,19,23 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub para testar

jobs:
  enviar_alerta:
    runs-on: ubuntu-latest
    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar Script de Alerta
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py
