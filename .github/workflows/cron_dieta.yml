name: Envio Diário da Dieta

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 BRT
    - cron: '0 12 * * *'   # 09:00 BRT
    - cron: '30 14 * * *'  # 11:30 BRT
    - cron: '0 19 * * *'   # 16:00 BRT
    - cron: '0 23 * * *'   # 20:00 BRT
    - cron: '1 1 * * *'    # 22:01 BRT (dia seguinte em UTC)
  workflow_dispatch:
  
jobs:
  enviar_alerta:
    runs-on: ubuntu-latest
    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar Script de Alerta
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEM }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py
